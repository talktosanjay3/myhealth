<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>myhealth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="app-name">
          <span class="mark"></span>
          myhealth
        </div>
      </div>
      <div class="header-right">
        <span class="current-date" id="currentDate"></span>
        <button class="btn btn-primary" id="addEntryBtn" aria-label="New entry">+ New Entry</button>
        <button class="btn-icon" id="settingsBtn" aria-label="Settings" title="Settings">&#9881;</button>
      </div>
    </header>

    <!-- Main Content -->
    <main id="mainContent">
      <!-- Loading state (shown initially) -->
      <div class="loading-state" id="loadingState">
        <div class="spinner"></div>
        <p>Loading your progress&hellip;</p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer" id="footer" hidden>
      track daily &middot; stay consistent &middot; be well
    </footer>
  </div>

  <!-- New Entry Modal -->
  <div class="modal-overlay" id="entryModal">
    <div class="modal">
      <div class="modal-header">
        <h2>New Entry</h2>
        <button class="modal-close" id="closeEntryModal" aria-label="Close">&times;</button>
      </div>
      <form id="entryForm" autocomplete="off">
        <div class="form-group">
          <label for="entryDate">Date</label>
          <input type="date" id="entryDate" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="proteinPercent">Protein %</label>
            <input type="number" id="proteinPercent" min="0" max="100" step="1" placeholder="80" />
          </div>
          <div class="form-group">
            <label for="waterGlasses">Water (glasses)</label>
            <input type="number" id="waterGlasses" min="0" max="30" step="1" placeholder="7" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="exerciseMinutes">Exercise (min)</label>
            <input type="number" id="exerciseMinutes" min="0" max="600" step="1" placeholder="30" />
          </div>
          <div class="form-group">
            <label for="sleepHours">Sleep (hours)</label>
            <input type="number" id="sleepHours" min="0" max="24" step="0.5" placeholder="7" />
          </div>
        </div>
        <div class="form-check">
          <label>
            <input type="checkbox" id="generalHealth" checked />
            Feeling good today
          </label>
        </div>
        <div class="form-group">
          <label for="notes">Notes <span style="color:var(--text-tertiary)">(optional)</span></label>
          <textarea id="notes" rows="2" placeholder="How are you feeling?"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelEntryBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Entry</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close" id="closeSettingsModal" aria-label="Close">&times;</button>
      </div>
      <p class="settings-note">
        To save entries directly from this page, provide a
        <a href="https://github.com/settings/tokens?type=beta" target="_blank" rel="noopener">GitHub fine-grained token</a>
        with <strong>Issues: Write</strong> access to this repository.
        Without it, entries are saved locally only.
      </p>
      <form id="settingsForm" autocomplete="off">
        <div class="form-group">
          <label for="githubToken">GitHub Token</label>
          <input type="password" id="githubToken" placeholder="github_pat_..." />
        </div>
        <div class="form-group">
          <label for="repoFull">Repository</label>
          <input type="text" id="repoFull" placeholder="owner/repo" />
        </div>
        <div class="gh-status" id="ghStatus">
          <span class="indicator" id="ghIndicator"></span>
          <span id="ghStatusText">Not connected</span>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelSettingsBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
