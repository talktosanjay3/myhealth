name: Update Health Checklist

on:
  issues:
    types: [opened, edited]

jobs:
  update-checklist-json:
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update checklist JSON from issue
        run: node scripts/update-checklist.js "$GITHUB_EVENT_PATH"

      - name: Commit JSON update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/checklist.json
          git diff --cached --quiet || git commit -m "Update health checklist from issue #${{ github.event.issue.number }}"
          git push
