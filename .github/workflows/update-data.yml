name: Update Data

on:
  issues:
    types: [opened, edited]

jobs:
  update-data-json:
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update activities JSON (if activity-change issue)
        if: contains(github.event.issue.labels.*.name, 'activity-change')
        run: node scripts/update-activities.js "$GITHUB_EVENT_PATH"

      - name: Update events JSON (if health-entry issue)
        if: contains(github.event.issue.labels.*.name, 'health-entry')
        run: node scripts/update-events.js "$GITHUB_EVENT_PATH"

      - name: Commit JSON updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update data from issue #${{ github.event.issue.number }}"
          git push
